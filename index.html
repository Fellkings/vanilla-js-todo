<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f5f5; padding: 20px; display: flex; justify-content: center; }
    .app-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    h1 { margin-top: 0; text-align: center; color: #333; }
    input[type="text"] { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    li.completed span { text-decoration: line-through; color: #aaa; }
    .filters { display: flex; justify-content: space-around; margin-top: 15px; padding-top: 15px; border-top: 1px solid #ddd; }
    button { background: #007BFF; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    button.danger { background: #FF4136; }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>

  <div class="app-container">
    <h1>Мои задачи</h1>
    
    <form id="todo-form">
      <input type="text" id="todo-input" placeholder="Что нужно сделать?" autocomplete="off" required>
    </form>

    <ul id="todo-list"></ul>

    <div class="filters">
      <button onclick="dispatch({ type: 'SET_FILTER', payload: 'all' })">Все</button>
      <button onclick="dispatch({ type: 'SET_FILTER', payload: 'active' })">Активные</button>
      <button onclick="dispatch({ type: 'SET_FILTER', payload: 'completed' })">Завершенные</button>
    </div>
  </div>

  <script src="./logic.js"></script>
  
  <script>
    let state = {
      todos: [],
      filter: 'all'
    };

    function dispatch(action) {
      state = updateState(state, action);
      render();
    }

    function render() {
      const listElement = document.getElementById('todo-list');
      listElement.innerHTML = '';

      let visibleTodos = state.todos;
      if (state.filter === 'active') {
        visibleTodos = state.todos.filter(todo => !todo.completed);
      } else if (state.filter === 'completed') {
        visibleTodos = state.todos.filter(todo => todo.completed);
      }

      visibleTodos.forEach(todo => {
        const li = document.createElement('li');
        if (todo.completed) li.className = 'completed';

        li.innerHTML = `
          <label style="cursor: pointer; display: flex; align-items: center; gap: 10px;">
            <input type="checkbox" ${todo.completed ? 'checked' : ''} 
                   onchange="dispatch({ type: 'TOGGLE', payload: ${todo.id} })">
            <span>${todo.title}</span>
          </label>
          <button class="danger" onclick="dispatch({ type: 'DELETE', payload: ${todo.id} })">✕</button>
        `;
        listElement.appendChild(li);
      });
    }

    document.getElementById('todo-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const input = document.getElementById('todo-input');
      const title = input.value.trim();
      
      if (title) {
        dispatch({ type: 'ADD', payload: title });
        input.value = '';
      }
    });

    render();
  </script>
</body>
</html>
